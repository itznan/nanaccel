name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Tag name for the release (e.g. v0.1.0)'
        required: true
        default: 'v0.1.0'

permissions:
  contents: write

jobs:
  build-and-release:
    name: Build and Release
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Fetch all history for automated changelog generation

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2

      - name: Run Tests
        run: cargo test --all-targets

      - name: Build Release Binary
        run: cargo build --release

      - name: Package Binary and Assets
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path release-pkg
          Copy-Item target/release/nanaccel.exe release-pkg/
          if (Test-Path LICENSE) { Copy-Item LICENSE release-pkg/ }
          if (Test-Path README.md) { Copy-Item README.md release-pkg/ }
          Compress-Archive -Path release-pkg/* -DestinationPath nanaccel-windows-x86_64.zip
          
          # Generate SHA256 checksum for download verification
          $hash = (Get-FileHash nanaccel-windows-x86_64.zip -Algorithm SHA256).Hash
          "$hash  nanaccel-windows-x86_64.zip" | Out-File -FilePath nanaccel-windows-x86_64.zip.sha256 -Encoding ascii

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag_name || github.ref_name }}
          files: |
            nanaccel-windows-x86_64.zip
            nanaccel-windows-x86_64.zip.sha256
          draft: false
          prerelease: false
          generate_release_notes: true
          name: Release ${{ github.event.inputs.tag_name || github.ref_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
